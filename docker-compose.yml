version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: hrms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
      POSTGRES_DB: hrms
    ports:
      - "5432:5432"
    volumes:
      - hrms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms -d hrms"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: run the API in a container instead of on the host.
  # The backend image is not pre-built here; uncomment and add a
  # backend/Dockerfile if you want fully containerized deployment.
  #
  # backend:
  #   build: ./backend
  #   container_name: hrms_backend
  #   restart: unless-stopped
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://hrms:hrms@db:5432/hrms?schema=public
  #     JWT_SECRET: change_me_in_production
  #     PORT: 4000
  #   ports:
  #     - "4000:4000"

volumes:
  hrms_pgdata:
